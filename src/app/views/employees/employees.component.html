<section class="employees-page">
  <c-card class="shadow-sm">
    <c-card-header class="d-flex flex-column flex-md-row align-items-start align-items-md-center justify-content-between gap-3">
      <div>
        <div class="text-uppercase text-body-secondary fs-xs mb-1 letter-spacing">Workforce Directory</div>
        <h3 class="mb-0">Employees</h3>
      </div>
      <button cButton color="primary" class="px-4">
        <svg cIcon name="cilUserPlus" class="me-2"></svg>
        Add Employee
      </button>
    </c-card-header>
    <c-card-body>
      <div class="table-responsive">
        <table cTable class="table align-middle mb-0">
          <thead class="table-light text-uppercase small">
            <tr>
              <th>Employee</th>
              <th>Email</th>
              <th>Department</th>
              <th>Role</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody>
            <ng-container *ngIf="employees$ | async as employees; else loading">
              <tr *ngFor="let employee of employees">
                <td class="d-flex align-items-center gap-3">
                  <c-avatar size="md" src="{{ employee.avatar }}" />
                  <div>
                    <div class="fw-semibold">{{ employee.name }}</div>
                    <div class="text-body-secondary small">ID {{ employee.id }}</div>
                  </div>
                </td>
                <td>{{ employee.email }}</td>
                <td>{{ employee.department }}</td>
                <td>{{ employee.role }}</td>
                <td>
                  <c-badge [color]="employee.statusColor" shape="rounded-pill">
                    {{ employee.status }}
                  </c-badge>
                </td>
              </tr>
            </ng-container>
          </tbody>
        </table>
      </div>
      <ng-template #loading>
        <tr>
          <td colspan="5" class="text-center py-5 text-body-secondary">Loading employee data...</td>
        </tr>
      </ng-template>
    </c-card-body>
  </c-card>
</section>
